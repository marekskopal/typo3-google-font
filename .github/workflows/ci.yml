name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: |
          composer config --no-plugins allow-plugins.typo3/cms-composer-installers false
          composer config --no-plugins allow-plugins.typo3/class-alias-loader false
          composer install --no-progress
      - run: vendor/bin/phpstan analyse

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - run: |
          composer config --no-plugins allow-plugins.typo3/cms-composer-installers false
          composer config --no-plugins allow-plugins.typo3/class-alias-loader false
          composer install --no-progress
      - run: vendor/bin/phpcs
